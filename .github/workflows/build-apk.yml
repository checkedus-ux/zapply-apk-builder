name: Build APK for Zapply

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "Unique app ID from Zapply database"
        required: true
        type: string
      html_url:
        description: "Supabase Storage URL of the generated HTML file"
        required: true
        type: string
      app_name:
        description: "Display name for the Android app"
        required: true
        type: string
      callback_url:
        description: "Zapply webhook URL to notify on build completion"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ─── 1. Checkout ───
      - name: Checkout repo
        uses: actions/checkout@v4

      # ─── 2. Java 17 ───
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ─── 3. Node.js 20 ───
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ─── 4. Cache Gradle ───
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('cordova-template/config.xml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ─── 5. Install Cordova ───
      - name: Install Cordova CLI
        run: npm install -g cordova

      # ─── 6. Create Cordova project ───
      - name: Create Cordova project
        run: |
          SAFE_ID=$(echo "${{ inputs.app_id }}" | tr -cd 'a-zA-Z0-9' | head -c 30)
          PACKAGE="com.zapply.app${SAFE_ID}"
          cordova create app-build "${PACKAGE}" "${{ inputs.app_name }}"
          echo "PACKAGE_ID=${PACKAGE}" >> $GITHUB_ENV
          echo "Created project: ${PACKAGE}"

      # ─── 7. Add Android platform ───
      - name: Add Android platform
        working-directory: app-build
        run: cordova platform add android

      # ─── 8. Download HTML ───
      - name: Download generated HTML
        working-directory: app-build
        run: |
          echo "Downloading: ${{ inputs.html_url }}"
          HTTP_CODE=$(curl -sL -w "%{http_code}" -o www/index.html "${{ inputs.html_url }}")

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Download failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

          FILE_SIZE=$(wc -c < www/index.html)
          if [ "$FILE_SIZE" -lt 50 ]; then
            echo "::error::Downloaded file too small (${FILE_SIZE} bytes) — likely invalid"
            exit 1
          fi

          echo "Downloaded ${FILE_SIZE} bytes (HTTP ${HTTP_CODE})"

      # ─── 9. Update config.xml ───
      - name: Configure app metadata
        working-directory: app-build
        run: |
          # Copy template config
          cp ../cordova-template/config.xml config.xml

          # Override package ID
          sed -i "s|id=\"com.zapply.generatedapp\"|id=\"${PACKAGE_ID}\"|g" config.xml

          # Override app name
          APP_NAME_ESCAPED=$(echo "${{ inputs.app_name }}" | sed 's/[&/\]/\\&/g')
          sed -i "s|<name>ZapplyApp</name>|<name>${APP_NAME_ESCAPED}</name>|g" config.xml

          echo "Config updated:"
          head -5 config.xml

      # ─── 10. Build debug APK ───
      - name: Build Android debug APK
        working-directory: app-build
        run: |
          echo "Starting Cordova build..."
          cordova build android --debug --no-telemetry 2>&1 | tail -20
          echo "Build completed"

      # ─── 11. Find APK path ───
      - name: Locate APK file
        id: find_apk
        working-directory: app-build
        run: |
          APK_PATH=$(find platforms/android -name "*.apk" -type f -path "*/debug/*" | head -1)

          if [ -z "$APK_PATH" ]; then
            # Fallback: any APK
            APK_PATH=$(find platforms/android -name "*.apk" -type f | head -1)
          fi

          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK file found after build"
            exit 1
          fi

          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "apk_path=${APK_PATH}" >> $GITHUB_OUTPUT
          echo "Found APK: ${APK_PATH} (${APK_SIZE})"

      # ─── 12 & 13. Upload APK to Supabase Storage ───
      - name: Upload APK to Supabase Storage
        id: upload
        working-directory: app-build
        run: |
          STORAGE_PATH="apk-files/${{ inputs.app_id }}/app.apk"
          UPLOAD_URL="${{ secrets.SUPABASE_URL }}/storage/v1/object/${STORAGE_PATH}"

          echo "Uploading to: ${STORAGE_PATH}"

          # Try POST (create)
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${UPLOAD_URL}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "x-upsert: true" \
            --data-binary @"${{ steps.find_apk.outputs.apk_path }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Upload response (HTTP ${HTTP_CODE}): ${BODY}"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            # Retry with PUT (update)
            echo "POST failed, trying PUT upsert..."
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X PUT "${UPLOAD_URL}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -H "Content-Type: application/vnd.android.package-archive" \
              --data-binary @"${{ steps.find_apk.outputs.apk_path }}")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "::error::Upload failed (HTTP ${HTTP_CODE}): ${BODY}"
              exit 1
            fi
          fi

          # Build public URL
          APK_URL="${{ secrets.SUPABASE_URL }}/storage/v1/object/public/${STORAGE_PATH}"
          echo "apk_url=${APK_URL}" >> $GITHUB_OUTPUT
          echo "Upload successful: ${APK_URL}"

      # ─── 14. Callback — success ───
      - name: Notify Zapply — build succeeded
        if: success()
        run: |
          echo "Sending success callback..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_SECRET }}" \
            -d "{
              \"app_id\": \"${{ inputs.app_id }}\",
              \"apk_url\": \"${{ steps.upload.outputs.apk_url }}\",
              \"status\": \"ready\"
            }")
          echo "Callback response: HTTP ${HTTP_CODE}"

      # ─── 15. Callback — failure ───
      - name: Notify Zapply — build failed
        if: failure()
        run: |
          echo "Sending failure callback..."
          FAILED_STEP="${{ github.action }}"
          curl -s -o /dev/null \
            -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_SECRET }}" \
            -d "{
              \"app_id\": \"${{ inputs.app_id }}\",
              \"apk_url\": null,
              \"status\": \"failed\",
              \"error\": \"Build failed at step: ${FAILED_STEP}\"
            }"
          echo "Failure callback sent"
