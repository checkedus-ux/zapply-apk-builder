name: Build APK for Zapply

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "Unique app ID from Zapply database"
        required: true
        type: string
      tsx_url:
        description: "Supabase Storage URL of the generated App.tsx file"
        required: true
        type: string
      app_name:
        description: "Display name for the Android app"
        required: true
        type: string
      callback_url:
        description: "Zapply webhook URL to notify on build completion"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ─── 1. Checkout ───
      - name: Checkout repo
        uses: actions/checkout@v4

      # ─── 2. Java 17 ───
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ─── 3. Node.js 20 ───
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ─── 4. Setup Android SDK ───
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ─── 5. Accept Android licenses ───
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # ─── 6. Cache npm + Gradle ───
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.npm
          key: build-${{ runner.os }}-${{ hashFiles('template/package-lock.json') }}
          restore-keys: |
            build-${{ runner.os }}-

      # ─── 7. Copy template to build directory ───
      - name: Setup build directory
        run: |
          cp -r template/ app-build/
          echo "Template copied to app-build/"
          ls -la app-build/

      # ─── 8. Download AI-generated code ───
      - name: Download generated code
        working-directory: app-build
        run: |
          echo "Downloading: ${{ inputs.tsx_url }}"
          HTTP_CODE=$(curl -sL -w "%{http_code}" -o generated-code.txt "${{ inputs.tsx_url }}")

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Download failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

          FILE_SIZE=$(wc -c < generated-code.txt)
          if [ "$FILE_SIZE" -lt 50 ]; then
            echo "::error::Downloaded file too small (${FILE_SIZE} bytes) — likely invalid"
            exit 1
          fi

          echo "Downloaded: ${FILE_SIZE} bytes (HTTP ${HTTP_CODE})"
          echo "First 5 lines:"
          head -5 generated-code.txt

      # ─── 9. Merge multi-file into single App.tsx ───
      - name: Merge code into single App.tsx
        working-directory: app-build
        run: |
          INPUT="generated-code.txt"

          # Strip ---FILE: markers and merge everything into one App.tsx
          # Zapply's multi-file format uses global scope (no imports between files)
          # so merging into one file works perfectly for Vite build
          if grep -q "^---FILE:" "$INPUT" || grep -q "^// ---FILE:" "$INPUT"; then
            echo "Multi-file format detected, merging into single App.tsx..."

            # Remove ---FILE: marker lines, keep all code
            sed -E '/^\s*(\/\/\s*)?---FILE:.*---\s*$/d' "$INPUT" > src/App.tsx

            LINES=$(wc -l < src/App.tsx)
            echo "Merged App.tsx: ${LINES} lines"
          else
            echo "Single-file format, using as App.tsx directly"
            cp "$INPUT" src/App.tsx
          fi

          # Inject React imports at top if not present
          # Zapply's Sandpack format uses `var useState = React.useState` without imports
          if ! grep -q "^import React" src/App.tsx && ! grep -q "^import { " src/App.tsx; then
            echo "Injecting React imports..."
            IMPORTS='import React, { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } from "react";'

            # Check if lucide icons are used
            LUCIDE_ICONS=$(grep -oP '(?<=<)\w+(?=\s)' src/App.tsx | sort -u | while read icon; do
              if echo "$icon" | grep -qE '^(Sun|Moon|Star|Heart|Home|Search|Menu|X|Plus|Minus|Check|ChevronRight|ChevronLeft|ChevronDown|ChevronUp|ArrowLeft|ArrowRight|Settings|User|Bell|Mail|Phone|MapPin|Calendar|Clock|Filter|Edit|Trash|Download|Upload|Share|Copy|Eye|EyeOff|Lock|Unlock|Info|AlertCircle|AlertTriangle|ShoppingCart|ShoppingBag|CreditCard|Bookmark|Tag|Zap|Activity|TrendingUp|Award|Gift|Coffee|Utensils|Dumbbell|Flame|Droplets|Wind|Cloud|Thermometer|Navigation|Target|BarChart|PieChart|LineChart|Database|Server|Globe|Wifi|Battery|Monitor|Smartphone|Camera|Image|Video|Music|Headphones|Speaker|Mic|Play|Pause|SkipForward|SkipBack|Volume2|LogOut|LogIn|UserPlus|Users|Send|MessageCircle|MessageSquare|Hash|AtSign|Paperclip|Link|ExternalLink|Layers|Grid|List|Layout|Sidebar|Columns|Square|Circle|Triangle|Hexagon|Octagon|Shield|Flag|Crosshair|Move|Maximize|Minimize|RotateCw|RefreshCw|Loader|MoreHorizontal|MoreVertical|Sliders|ToggleLeft|ToggleRight|Power|Save|FolderOpen|File|FileText|Clipboard|Archive|Box|Package|Truck|Store|Wallet|DollarSign|Percent|Receipt|Building|Briefcase|GraduationCap|BookOpen|Lightbulb|Wrench|Tool|Cog|Key|Fingerprint|QrCode|Scan|Printer|Terminal)$'; then
                echo "$icon"
              fi
            done | paste -sd, -)

            if [ -n "$LUCIDE_ICONS" ]; then
              IMPORTS="${IMPORTS}"$'\n'"import { ${LUCIDE_ICONS} } from \"lucide-react\";"
            fi

            # Prepend imports
            echo "$IMPORTS" | cat - src/App.tsx > /tmp/app_with_imports.tsx
            mv /tmp/app_with_imports.tsx src/App.tsx
            echo "Imports injected"
          fi

          # Ensure export default exists
          if ! grep -q "export default" src/App.tsx; then
            echo "export default App;" >> src/App.tsx
            echo "Added export default"
          fi

          rm -f generated-code.txt

          echo "First 10 lines:"
          head -10 src/App.tsx
          echo "..."
          echo "Last 5 lines:"
          tail -5 src/App.tsx

      # ─── 9b. Auto-repair incomplete files ───
      - name: Auto-repair incomplete code files
        working-directory: app-build
        run: |
          echo "Checking for incomplete files..."
          for f in $(find src -name "*.tsx" -o -name "*.ts" | sort); do
            # Count open vs close braces
            OPEN=$(grep -o '{' "$f" | wc -l)
            CLOSE=$(grep -o '}' "$f" | wc -l)
            DIFF=$((OPEN - CLOSE))

            if [ "$DIFF" -gt 0 ]; then
              echo "  Fixing $f: $DIFF missing closing brace(s)"
              for i in $(seq 1 $DIFF); do
                echo "}" >> "$f"
              done
            fi

            # Count open vs close parens
            OPEN_P=$(grep -o '(' "$f" | wc -l)
            CLOSE_P=$(grep -o ')' "$f" | wc -l)
            DIFF_P=$((OPEN_P - CLOSE_P))

            if [ "$DIFF_P" -gt 0 ]; then
              echo "  Fixing $f: $DIFF_P missing closing paren(s)"
              for i in $(seq 1 $DIFF_P); do
                echo ")" >> "$f"
              done
            fi
          done

          # Ensure App.tsx has export default
          if [ -f src/App.tsx ]; then
            if ! grep -q "export default" src/App.tsx; then
              echo "  Adding export default to App.tsx"
              echo "export default App;" >> src/App.tsx
            fi
          fi

          echo "Code repair complete"

      # ─── 10. Configure app metadata ───
      - name: Configure app metadata
        working-directory: app-build
        run: |
          SAFE_ID=$(echo "${{ inputs.app_id }}" | tr -cd 'a-zA-Z0-9' | head -c 30)
          PACKAGE_ID="com.zapply.app${SAFE_ID}"

          # Update capacitor.config.ts
          sed -i "s|appId: 'com.zapply.generated'|appId: '${PACKAGE_ID}'|g" capacitor.config.ts
          sed -i "s|appName: 'ZapplyApp'|appName: '${{ inputs.app_name }}'|g" capacitor.config.ts

          echo "PACKAGE_ID=${PACKAGE_ID}" >> $GITHUB_ENV
          echo "Configured: ${PACKAGE_ID} / ${{ inputs.app_name }}"

      # ─── 11. Install npm dependencies ───
      - name: Install dependencies
        working-directory: app-build
        run: npm install

      # ─── 12. Build with Vite ───
      - name: Build React app
        working-directory: app-build
        run: |
          echo "Building React app with Vite..."
          npx vite build
          echo "Build output:"
          ls -la dist/

      # ─── 13. Sync with Capacitor ───
      - name: Sync Capacitor Android
        working-directory: app-build
        run: |
          npx cap sync android
          echo "Capacitor sync complete"

      # ─── 14. Build Android APK ───
      - name: Build Android debug APK
        working-directory: app-build/android
        run: |
          echo "Starting Gradle build..."
          ./gradlew assembleDebug
          echo "APK build completed"

      # ─── 15. Locate APK file ───
      - name: Locate APK file
        id: find_apk
        working-directory: app-build
        run: |
          APK_PATH=$(find android -name "*.apk" -type f -path "*/debug/*" | head -1)

          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find android -name "*.apk" -type f | head -1)
          fi

          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK file found after build"
            find android/app/build -type f -name "*.apk" 2>/dev/null || true
            exit 1
          fi

          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "apk_path=${APK_PATH}" >> $GITHUB_OUTPUT
          echo "Found APK: ${APK_PATH} (${APK_SIZE})"

      # ─── 16. Upload APK to Supabase Storage ───
      - name: Upload APK to Supabase Storage
        id: upload
        working-directory: app-build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          APK_FILE="${{ steps.find_apk.outputs.apk_path }}"
          BUCKET="apk-files"
          OBJECT_PATH="${{ inputs.app_id }}/app.apk"

          SUPABASE_URL=$(echo "${SUPABASE_URL}" | tr -d '[:space:]')
          SUPABASE_SERVICE_KEY=$(echo "${SUPABASE_SERVICE_KEY}" | tr -d '[:space:]')

          UPLOAD_URL="${SUPABASE_URL}/storage/v1/object/${BUCKET}/${OBJECT_PATH}"

          echo "APK size: $(du -h "${APK_FILE}" | cut -f1)"

          HTTP_CODE=$(curl -s -o /tmp/upload_response.json -w "%{http_code}" \
            -X POST "${UPLOAD_URL}" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "x-upsert: true" \
            --data-binary "@${APK_FILE}")

          echo "Upload response (HTTP ${HTTP_CODE}):"
          cat /tmp/upload_response.json 2>/dev/null || true

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            HTTP_CODE=$(curl -s -o /tmp/upload_response.json -w "%{http_code}" \
              -X PUT "${UPLOAD_URL}" \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              -H "Content-Type: application/vnd.android.package-archive" \
              --data-binary "@${APK_FILE}")

            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "::error::Upload failed (HTTP ${HTTP_CODE})"
              exit 1
            fi
          fi

          APK_URL="${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${OBJECT_PATH}"
          echo "apk_url=${APK_URL}" >> $GITHUB_OUTPUT
          echo "Upload successful: ${APK_URL}"

      # ─── 17. Callback — success ───
      - name: Notify Zapply — build succeeded
        if: success()
        continue-on-error: true
        run: |
          curl -s -o /dev/null -w "Callback: HTTP %{http_code}\n" \
            -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_SECRET }}" \
            -d "{
              \"app_id\": \"${{ inputs.app_id }}\",
              \"apk_url\": \"${{ steps.upload.outputs.apk_url }}\",
              \"status\": \"ready\"
            }"

      # ─── 18. Callback — failure ───
      - name: Notify Zapply — build failed
        if: failure()
        continue-on-error: true
        run: |
          curl -s -o /dev/null \
            -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CALLBACK_SECRET }}" \
            -d "{
              \"app_id\": \"${{ inputs.app_id }}\",
              \"apk_url\": null,
              \"status\": \"failed\",
              \"error\": \"Build failed\"
            }"
